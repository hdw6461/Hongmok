        /**

        const rawData = [
            { type: "text", date: "20260501", title: "하나님의 음성", content: `청년 시절 Again 1907의 광풍 아래에서 살았다. 성령, 은사, 영적체험이 주요 이슈였다. 나 또한 구약성경에 나온 인물들처럼 하나님의 음성을 듣고 싶었다. 처음으로 충격받았던 책은 베니힌의 <안녕하세요 성령님>이었다. 진짜 성령과 대화를 한다고? 나 또한 자연스럽게 그런 분위기 속에서 은사를 구했다. 관련해서 처음 읽은 책은 조이 도우슨의 <하나님의 음성을 듣는 삶>이었을 것이다. 그와 유사한 책으로는 로렌 커닝햄의 <하나님, 정말 당신이십니까?>였던 것 같다. 두 책 모두 읽었다. 나는 그들의 친밀함이 부러웠다.

당시 군 인트라넷에 어떤 신앙 게시판이 있었던 것으로 기억한다. 그때 한 병사는 브래드 저삭의 <내 양은 내 음성을 듣는다>는 책을 추천했다. 물론 그 책은 읽지 않고 도서관에 신청만 넣어두었다. 다만 책 제목 자체만으로 무슨 의미인지 알 수 있었다. 그래서 하나님의 음성을 들을 수 있었냐고 묻는다면 비슷한 은사체험을 했다. 군 시절 뜨겁게 하루에 1-2시간 이상 기도하며 놀라운 신비체험을 했다. 당시 나는 ‘예언기도’와 유사한 것들을 경험했다. 어느 시점에 나는, 하나님의 음성을 듣기 원했던 시절의 체험을 자연스럽게 영유하고 있었다.

하지만 시간이 지나면서 점점 그런 체험을 갈구하진 않았다. 굳이 따지자면 축구에서 몇몇 선수가 선보이는 화려한 기술에 가까웠다. 쓰면 화려하지만 생각보다는 쓸모가 없고, 특별한 국면에서 필요는 하지만 굳이 쓸 필요가 없는 신기한 기술같았달까. 그러면서 나는 자연스럽게, 읽진 않았던 때에도, 달라스 윌라드의 <하나님의 음성>이 말하는 바에 가까워져갔다. 굳이 두 종류의 책을 비교하자면 전자의 책은 ‘기술’을 가르치고, ‘기술’에 근거한 사례를 나열한다. 반면 후자의 책은 ‘태도’를 가르치고 ‘태도’에 근거해 하나님이 누구이며, 우리가 누구인지에 집중한다.

이번 주 요나서 강해설교 첫 번째를 준비하면서 나는 ‘하나님의 음성’에 대해 다루기로 했다. 요나는 열왕기 기록에 따르면 참된 예언자 반열에 있다고 보기 힘들다. 그는 국수주의자에 가깝다. 여로보암 2세의 측근이다. 하지만 요나서는 국수주의자 요나에게, 니느웨에 하나님의 뜻을 전할 것을 말한다. 이는 역설이다. 하나님께서, 그 일을 가장 하기 싫어하는 사람에게, 그 일을 맡기시는 이야기다. 나는 첫 번째 설교로 ‘하나님의 음성’에 대한 기술을 비판하고, 태도에 대해서 강변하며, 무척이나 끈질기고도 집요하게 ‘말씀’하시는 하나님에 대해 설교하기로 마음을 먹었다.

사실 ‘하나님의 음성’에 대해 설교하기로 마음을 먹은 이유 중의 하나는 나의 실존 때문이다. 12월 마지막 주에 부임한 이후 매주 새로운 사건이 터졌다. 아슬아슬한 상황이 이어졌다. 매주 나는 진로를 고민했다. 문제는 내가 고민한다고 해결될 것도 아닌데도 끈질기게 고민한다는 점이다. 다양한 가상의 상황을 놓고 수십 번 시나리오를 돌렸다. 그 어떤 시나리오 하나 딱 마음에 들지 않았다. 그럼에도 계속해서 고민하며 하나님의 인도하심을 갈구했다. 사실 내가 해야 할 설교는, 가장 먼저 내게 하고 싶은 설교에 가깝다. ‘하나님의 음성’을 듣는 기술적 방법을 궁구하지 말고, 어떤 ‘하나님의 음성’이든 순종하겠다는 태도로 하나님을 모시라는, 매우 담백한, 나를 위한 설교.

최근 PNTC고린도후서가 로고스 오리지널로 번역되었다. 그와 유사한 시기에 박윤만 선생님의 고린도후서도 감은사에서 출간되었다. 안그래도 고린도후서를 살펴보던 차이기에 둘 다 조금씩 발췌해서 읽었다. 박윤만 선생님은 ‘고난’이란 키워드에 집중하면서, 왕왕 그리스-로마 철학자들의 ‘고난’에 대한 이해와 비교한다. 그리스-로마 철학자들은 ‘고난’에 대해 초월할 수 있는 ‘덕’을 함양할 것을 요청한다. 반면 고린도후서는 ‘덕’에 전혀 관심이 없다. 이에 대한 이야기를 읽으면서 사실 갸우뚱했다. 왜냐하면 둘 다 ‘고난’이라는 키워드를 다루지만 그리스 로마 철학자들이 몰두한 ‘고난’과 바울이 씨름한 ‘고난’의 종류는 달라보였기 때문이었다. 나는 틀린 비교란 생각이 들었다.

하지만 박윤만 선생님의 주석 부록에는 <예수의 바울의 길>이라는 글이 있다. 석굴암 불상을 보고는 모든 고통을 초월한 부처의 ‘덕’을 묵상하면서, 그리스도인의 성화에 대해 고민한 생각들이 기록되어 있다. 박윤만 선생님은 예수의 사례와 바울의 사례를 들면서, 이들은 부처와는 달랐다고 말한다. 다음 문장이 핵심이라 생각한다. “번민도 없고 갈등도 없이 그냥 줄기차게 고속도로를 달리는 것이 아니라, 수많은 번민, 갈등, 그리고 혼돈과 흔들림 속에서 한 가닥 잡는 하나님의 말씀을 붙잡고 한 걸음 또 한 걸음 내디디며 걸어가는 것이 모든 그리스도인이 걸어야 할 성화의 길이다.” 박윤만 선생님의 실존적 고민이 묻어난 비교였던 것이다.

-

하나님의 음성을 듣는 기술 자체가 틀린 것은 아니다. 반면 그런 유의 기술이 소비되는 기저에는, ‘하나님의 음성’을 듣고 나면 확신과 기쁨을 통해, 그리스 로마 철학자들이 말하는 ‘덕’ 혹은 부처가 말하는 ‘성불’에 준하는 상태에 이를 수 있다는 우리의 망상이 있다. 하지만 실제 그리스도인의 삶은 그렇지 않다. 나는 매번 그러했다. 매번 기도 중에 하나님의 뜻을 알아차리곤 했다. 하지만 알아차렸다고 해서 번민이 사라지진 않았다. 고민과 갈등은 계속되었다. 오히려 후일에야, 그때 그 뜻이 기억나고, 그 뜻을 통하여 내가 처한 상황이 이해되었다. 하나님은 나에게 늘 말씀하셨지만, 오히려 그 말씀은 나를 더욱 고민케 만들었다. 상황에 초월하는 평강을 주시는 말씀이 아니라, 상황에 더욱 몰입하여 고뇌와 갈등을 겪게 하고, 이를 후일 선해하는 말씀이었다.

그러고보면 나는 여전히 씨름하고 고뇌하고 갈등하지만, 이는 하나님의 말씀을 듣지 않아 괴로워하는 류는 전혀 아니다. 오히려 내가 나아갈 방향이 무엇인지에 대해서는 아직 침묵하고 계시지만, 내가 앞으로 나아가기 위해서 견지해야 할 태도에 대해서는 끈질기게 말씀하시기에, 나는 이를 두고 씨름하고 고뇌하며 갈등한다. 그리스도인이 걸어야 할 길은, 부처의 길과도, 그리스 로마 철학자의 길과도 다르다. 그분의 말씀이 원체 신묘막측하시기에 그러하다.` },
            { type: "text", date: "20260430", title: "구속(Redemption)", content: `첫 전임사역을 할 때부터 나는 많은 교역자들과 의견이 달랐다. 대부분의 사안에서 ‘엄격한 잣대’를 들이대는 것보다는 다소 ‘관대한 잣대’를 들이대곤 했다. 교회는 봐줘야 한다며. 물론 그렇다고 무조건 봐줘야 한다는 주장을 한 것은 아니었다. 엄격한 규정을 세우는 것은 따로 만들어가되, 그와 별개로 규정을 근거로 사람을 징계하거나 배제하는 일은 최대한 삼가야 한다고 주장했다. 그런 유의 이야기를 주고 받을 때마다 나는 소수자였다. 하여 나는 내가 가진 ‘관대한 잣대’가, 내가 가진 일종의 신학적 성향이 아닐까 생각했다. 근본주의 배경에서 보수적 신학을 터한 이들에 비해 난 다소 리버럴하니까. 하여 나는 리버럴해서 내가 관대하지 않을까 생각했다.

곱씹어보면 나의 관대함은 군 시절 경험했던 영적체험으로부터 비롯되었다. 군 시절 나는 모든 것을 잃은 상태였다. 연애하던 여자친구와도 헤어졌고, 내가 세워왔던 인생계획은 파산되었다. 남들보다 뒤늦게 입대한 군대에서 나는 허송세월을 하는 것처럼 느껴졌다. 하여 나는 군생활 내내 나를 다듬어달라고 울부짖었다. 군생활의 기간이 결코 헛되지 않은 시간이 되게 해달라고 기도했다. 그 시절 나는 내 안에 자격지심과 자기학대 성향으로 가득한 스스로를 발견했다. 나는 내게 일어난 모든 문제를 타인의 탓으로 돌리는 것에 전문가나 다름 없었다. 내 삶에 정적 몇 명만 없었다면 나는 연애에서 이별을 겪지 않았을 것이고, 내 삶에 정적 몇 명만 없었다면 나는 내가 받은 소명대로 신학교에 진학해있을 것이라, 그렇게 나는 믿고 있었다.

그 시절 나는 나를 용서하는데 시간을 허비했다. 무엇보다도 나를 사랑하고 보다듬어주는데 시간을 허비했다. 나 자신에게 수없이 건넨 말은 그동안 수고했으며, 존재 그 자체로 사랑받기 충분한다는 말이었다. 하루에도 몇 번씩이나 거울을 보고 내게 말을 건넸다. 나 자신이 나를 어느정도 용납하고 이해하게 되자 자연스럽게 내가 미워하던 이들의 얼굴이 떠올랐다. 나는 그들을 위해 진심으로 축복하며 기도했다. 나는 군생활 내내 자연스럽게 이 지난한 과정을 거쳤다. 그 시간은 나를 괴롭히던 쓴뿌리가 해결되는 시간이었으며, 자격지심과 남탓으로 똘똘 뭉친 어린아이가, 성인으로 장성하는 과정이나 다름 없었다. 실제 나는 그때의 나를 누구보다도 또렷이 기억한다. 아니, 반복해서 기억한다. 그러니 타인에게 관대함을 베푸는 나의 성향은 신학이라기보다는 영적체험에 있다고 생각했다.

후일 시간이 지나고 더 많은 사람들을 만나면서 알게 되었다. 리버럴한 신학적 배경을 갖고 있는 사람도 충분히 관대하지 않을 수 있다. 속칭 옹졸할 수 있다. 자신의 정적을 쳐내는데 있어서는 하물며 교회 공동체 안이라도 집요하고 잔인할 때가 있다. 마찬가지로 보수적인 신학적 배경을 갖고 있는 사람도 충분히 관대할 수 있다. 그렇다면 결국은 영적체험의 문제였을까? 그럴 수도 있지만 시간이 지나면서 난 좀 다르게 생각했다. 자신을 용납하는 체험을 했다고 하더라도 애초에 옹졸한 성향의 인간이 있다. 또한 자신을 용납하지 못했다 하더라도 기본적으로 관대한 성향의 인간이 있다. 굳이 따지자면 나는 후자에 가깝다. 과거를 곱씹으면 곱씹을수록 나는 아무것도 모르던 초등학교 시절부터 관대함을 추종했다. 청년 시절 예수에게 매료되었던 이유도 그의 가르침이나 그의 기적이 아니었다. 창녀와 세리와 어부들과 함께 지낸 그의 관대함 때문이었다. 굳이 따지자면 나는 성향상 관대한 사람으로 지어졌던 것이다. 

무엇보다도 2017년에서부터 2018년 어간에 내 삶에 일어났던 일은 무척 중요하다. 나는 당시 전임사역을 시작했고, 결혼생활 초기였다. 이전까지는 ’목회자‘로 누군가에게 인정을 받아본 적이 없었다. 늘 자유주의와 좌파 정치를 추종하는 전도사라는 의구심 속에 살아왔다. 또한 이전까지는 연애를 계속해왔지만 누군가로부터 전폭적인 신뢰와 애정을 받아본 적이 없었다. 하여 나는 매번 연애를 오래 이어가질 못했다. 무엇보다도 사랑받지 못한 나의 내면은 뒤틀려서 타인을 해하기에 여념이 없었다. 하지만 그 시기 나는 담임목사님으로부터, 교인으로부터, 광범위하게 인정을 받게 되었다. 손을 대는 사역마다 잘된 것은 아니었지만, 함께 동역하는 교인들이 나를 인정해주었다. 뿐만 아니라 아내는 뒤틀린 내면을 가진 나를 그저 용납하고 애정을 퍼부어주었다. 그 과정에서 나의 ’관대함‘이라는 성향은, 사실상 빛을 발했다.

누군가에게 ’구속‘이 무엇이냐고 묻는다면 나는 이와 같은 기나긴 서사를 들려주겠다. 나는 어떤 방식으로 구속되었는지 잘 모른다. 이를 관찰하면서 살아오지 않았다. 다만 어느 시점 돌이켜보니 나는 여타 다른 목사들에 비해 타인에 대해 관대한 태도를 갖고 있었다. 나는 그 사실로부터 끝없이 과거를 추적했다. 관대한 태도의 근원이 어디에 있는지 끈질기게 추적했다. 근원은 나의 기질 자체, 즉 하나님이 창조하신 본성 그 자체에 있었다. 누군가는 타인을 용납하기 위해 창조되며, 누군가는 질서를 세우기 위해 창조된다면, 나는 철저히 전자로 창조되었다. 하지만 여타 다른 이유로 말미암아 내 안의 내면은 온통 엉망진창이었다. 나는 나 자신을 싫어했고, 목회자로 사는 삶에서도 줄곧 인정을 받지 못하였고, 남자로 태어나 어떤 여성에게 깊은 사랑을 경험하지 못한채 완전히 망가지고 있었다. 하여 나의 관대한 기질은 꽃을 피우지 못하고 있었다.

하지만 나의 삶에 이해할 수 없는 은총의 사건들이 몇 번 찾아왔다. 군시절, 그리고 전임사역 시절, 한 번은 과거의 늪으로부터 헤쳐나오기 위해 발버둥치던 삶에서 경험했던 영적 경험으로부터, 그리고 또 한 번은 운이 좋게도 다소 넓은 범위의 사람들에게서 일시적으로 깊은 사랑과 인정으로부터. 그런 사건은 내게 없던 본성을 새롭게 창조했던 것이 아니었다. (즉 홀로 관대한 성품을 갖고자 애써서 획득한 결과물이 아니란 말이다.) 애초부터 근원적으로 타고 태어났던 본성을, 하지만 세파 속에서 완전히 망가진 본성을, 되살려주었다. 적어도 내가 목사로 지닌 ’관대함‘이란 속성은, 이처럼 세월 속에, 내 삶에 찾아오는 은혜 속에, 구속받은 결과물이다.` },

            const match = fullTitle.match(/^\[(.*?)\](.*)$/);

                return { category: match[1].trim(), title: match[2].trim() };
            }
            return { category: null, title: fullTitle };

        function formatDisplayDate(dateStr) {
            if (!dateStr || dateStr.length !== 8) return dateStr;
            const y = dateStr.substring(0, 4);
            const m = dateStr.substring(4, 6);
            const d = dateStr.substring(6, 8);
            return `${y}년 ${m}월 ${d}일`;
        }

        function init() {

                const cacheBuster = new Date().getTime();
                pdfFrame.src = `https://docs.google.com/gview?url=${encodeURIComponent(current.url + "?t=" + cacheBuster)}&embedded=true`;

                pdfFrame.onload = () => {
                    loading.style.display = 'none';
                    pdfFrame.style.opacity = '1';
                };

                setTimeout(() => {
                    loading.style.display = 'none';
                    pdfFrame.style.opacity = '1';
                }, 5000);
            } else {
                pdfSection.style.display = 'none';
                textSection.style.display = 'block';
                textControls.style.display = 'flex';
                contentTypeBadge.textContent = 'Essays';
                contentTypeBadge.className = 'px-2 py-0.5 rounded text-[10px] font-bold bg-emerald-500 text-white';

                textContent.innerHTML = renderText(current.content);
                textSection.scrollTop = 0;
            }

            prevBtn.disabled = currentIndex === 0;
            nextBtn.disabled = currentIndex === sermonData.length - 1;
        }

        function changeTextStyles(type, dir) {
            if (type === 'font') currentFontSize = Math.max(0.9, Math.min(currentFontSize + dir * 0.1, 2.0));
            else currentLineHeight = Math.max(1.4, Math.min(currentLineHeight + dir * 0.1, 2.8));
            applyTextStyles();
        }

        function applyTextStyles() {
            textContent.style.fontSize = `${currentFontSize}rem`;
            textContent.style.lineHeight = `${currentLineHeight}`;
            textContent.style.setProperty('--dynamic-indent', `${currentFontSize * 1.2}rem`);
            textContent.style.setProperty('--dynamic-spacing', `${currentLineHeight * 0.8}em`);
        }

        function setupTheme() {
            const saved = localStorage.getItem('theme') || 'light';
            if (saved === 'dark') document.documentElement.classList.add('dark');
            const themeIcon = document.getElementById('themeIcon');
            themeIcon.className = saved === 'dark' ? 'fas fa-sun text-yellow-400' : 'fas fa-moon';

            document.getElementById('themeToggle').addEventListener('click', () => {
                const isDark = document.documentElement.classList.toggle('dark');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                themeIcon.className = isDark ? 'fas fa-sun text-yellow-400' : 'fas fa-moon';
            });
        }

        prevBtn.addEventListener('click', () => { if (currentIndex > 0) { currentIndex--; updateContent(); } });
        nextBtn.addEventListener('click', () => { if (currentIndex < sermonData.length - 1) { currentIndex++; updateContent(); } });

        window.onload = init;
    </script>
</body>
</html>

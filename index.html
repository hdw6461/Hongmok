            type: "pdf",
            date: "20260104",
            title: "야곱과 비극",
            url: "https://hdw6461.github.io/Hongmok/PDF/260104_The_Theology_of_Defeat.pdf"
        },{
            type: "pdf",
            date: "20260111",
            title: "숙명과 섭리",
            url: "https://hdw6461.github.io/Hongmok/PDF/260111_Fate_Becomes_Providence.pdf"
        },{
            type: "pdf",
            date: "20260118",
            title: "당신은 당신이 누구인지 아십니까?",
            url: "https://hdw6461.github.io/Hongmok/PDF/2260118_The_Mask_and_The_Name.pdf"
        },{
            type: "pdf",
            date: "20260125",
            title: "되는 기도",
            url: "https://hdw6461.github.io/Hongmok/PDF/260125_Becoming_Prayer.pdf"
        },{
            type: "pdf",
            date: "20260301",
            title: "욥, 그리고 구속",
            url: "https://hdw6461.github.io/Hongmok/PDF/260301_Time_Redeemed.pdf"
        },{
            type: "pdf",
            date: "20260308",
            title: "티끌과 재의 아름다움",
            url: "https://hdw6461.github.io/Hongmok/PDF/260308_The_Beauty_of_Dust.pdf"
        },{
            type: "pdf",
            date: "20260315",
            title: "고통이 허용된 세계",
            url: "https://hdw6461.github.io/Hongmok/PDF/260315_Beyond_Perfect_Control.pdf"
        },{
            type: "pdf",
            date: "20260322",
            title: "피조세계의 아름다움",
            url: "https://hdw6461.github.io/Hongmok/PDF/260322_Beyond_Moral_Order.pdf"
        }
                        ];

        // 3. 최근 날짜부터 보이도록 자동 정렬 (내림차순)
        const sermonData = [...rawData].sort((a, b) => parseInt(b.date) - parseInt(a.date));

        let currentIndex = 0;
        let currentFontSize = 1.15;
        let currentLineHeight = 1.9;

        // DOM 요소
        const viewerContainer = document.getElementById('viewerContainer');
        const pdfSection = document.getElementById('pdfSection');
        const textSection = document.getElementById('textSection');
        const pdfFrame = document.getElementById('pdfFrame');
        const textContent = document.getElementById('textContent');
        const textControls = document.getElementById('textControls');
        const loading = document.getElementById('loading');
        const displayDate = document.getElementById('displayDate');
        const currentTitle = document.getElementById('currentTitle');
        const contentTypeBadge = document.getElementById('contentTypeBadge');
        const pageIndicator = document.getElementById('pageIndicator');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const listDrawer = document.getElementById('listDrawer');
        const indexList = document.getElementById('indexList');

        // 2. 날짜 표기 변환 함수 (YYYYMMDD -> 0000년 00월 00일)
        function formatDisplayDate(dateStr) {
            if (!dateStr || dateStr.length !== 8) return dateStr;
            const y = dateStr.substring(0, 4);
            const m = dateStr.substring(4, 6);
            const d = dateStr.substring(6, 8);
            return `${y}년 ${m}월 ${d}일`;
        }

        function init() {
            setupTheme();
            updateContent();
            applyTextStyles();

            document.getElementById('listToggle').addEventListener('click', () => {
                renderIndexList();
                listDrawer.style.transform = 'translateX(0)';
            });
            document.getElementById('closeList').addEventListener('click', () => {
                listDrawer.style.transform = 'translateX(100%)';
            });
        }

        function renderIndexList() {
            indexList.innerHTML = '';
            sermonData.forEach((item, index) => {
                const isActive = currentIndex === index;
                const btn = document.createElement('button');
                btn.className = `w-full text-left p-4 rounded-xl transition-all flex flex-col gap-1 border ${
                    isActive
                    ? 'bg-blue-600 text-white border-blue-400 shadow-lg'
                    : 'bg-slate-50 dark:bg-slate-800/50 border-transparent hover:border-blue-500'
                }`;

                btn.innerHTML = `
                    <div class="flex justify-between items-center opacity-80">
                        <span class="text-[10px] font-bold uppercase tracking-widest">${item.type === 'pdf' ? 'Sermon' : 'Essay'}</span>
                        <span class="text-[10px]">${formatDisplayDate(item.date)}</span>
                    </div>
                    <div class="font-bold text-sm truncate">${item.title}</div>
                `;

                btn.onclick = () => {
                    currentIndex = index;
                    updateContent();
                    listDrawer.style.transform = 'translateX(100%)';
                };
                indexList.appendChild(btn);
            });
        }

        /**
         * 텍스트 렌더링 함수: "-" 기호를 디자인된 구분선으로 변경
         */
        function renderText(content) {
            return content.split('\n').map(line => {
                const trimmed = line.trim();
                // 하이픈 기호("-")만 있는 줄 처리 → 우아하고 세련된 구분선으로 변환
                if (trimmed === '-') {
                    return `
                        <div class="py-14 flex items-center justify-center w-full max-w-[150px] mx-auto opacity-50 dark:opacity-40">
                            <div class="h-[1px] flex-1 bg-slate-400 dark:bg-slate-500"></div>
                            <div class="mx-4 w-1.5 h-1.5 rotate-45 bg-slate-400 dark:bg-slate-500"></div>
                            <div class="h-[1px] flex-1 bg-slate-400 dark:bg-slate-500"></div>
                        </div>
                    `;
                }
                // 일반 문단: CSS 변수를 활용하여 글자 크기/줄간격 변화에 유연하게 반응하도록 설정
                return trimmed ? `<p class="text-justify break-keep transition-all duration-300" style="text-indent: var(--dynamic-indent); margin-bottom: var(--dynamic-spacing);">${trimmed}</p>` : '';
            }).join('');
        }

        function updateContent() {
            const current = sermonData[currentIndex];
            displayDate.textContent = formatDisplayDate(current.date);
            currentTitle.textContent = current.title;
            pageIndicator.textContent = `${currentIndex + 1} / ${sermonData.length}`;

            viewerContainer.classList.remove('animate-fade-in-up');
            void viewerContainer.offsetWidth;
            viewerContainer.classList.add('animate-fade-in-up');

            if (current.type === 'pdf') {
                pdfSection.style.display = 'block';
                textSection.style.display = 'none';
                textControls.style.display = 'none';
                contentTypeBadge.textContent = 'Sermon Note';
                contentTypeBadge.className = 'px-2 py-0.5 rounded text-[10px] font-bold bg-rose-500 text-white';

                loading.style.display = 'flex';
                pdfFrame.style.opacity = '0';
                pdfFrame.src = `https://docs.google.com/viewer?url=${encodeURIComponent(current.url)}&embedded=true`;

                pdfFrame.onload = () => {
                    loading.style.display = 'none';
                    pdfFrame.style.opacity = '1';
                };
            } else {
                pdfSection.style.display = 'none';
                textSection.style.display = 'block';
                textControls.style.display = 'flex';
                contentTypeBadge.textContent = 'Essays';
                contentTypeBadge.className = 'px-2 py-0.5 rounded text-[10px] font-bold bg-emerald-500 text-white';

                textContent.innerHTML = renderText(current.content);
                textSection.scrollTop = 0;
            }

            prevBtn.disabled = currentIndex === 0;
            nextBtn.disabled = currentIndex === sermonData.length - 1;
        }

        function changeTextStyles(type, dir) {
            if (type === 'font') currentFontSize = Math.max(0.9, Math.min(currentFontSize + dir * 0.1, 2.0));
            else currentLineHeight = Math.max(1.4, Math.min(currentLineHeight + dir * 0.1, 2.8));
            applyTextStyles();
        }

        function applyTextStyles() {
            textContent.style.fontSize = `${currentFontSize}rem`;
            textContent.style.lineHeight = `${currentLineHeight}`;
            
            // 글자 크기와 줄 간격 값에 연동되어 유연하게 변하는 들여쓰기 및 문단 간격 변수 세팅
            textContent.style.setProperty('--dynamic-indent', `${currentFontSize * 1.2}rem`);
            textContent.style.setProperty('--dynamic-spacing', `${currentLineHeight * 0.8}em`);
        }

        prevBtn.addEventListener('click', () => { if (currentIndex > 0) { currentIndex--; updateContent(); } });
        nextBtn.addEventListener('click', () => { if (currentIndex < sermonData.length - 1) { currentIndex++; updateContent(); } });

        function setupTheme() {
            const saved = localStorage.getItem('theme') || 'light';
            if (saved === 'dark') document.documentElement.classList.add('dark');
            const themeIcon = document.getElementById('themeIcon');
            themeIcon.className = saved === 'dark' ? 'fas fa-sun text-yellow-400' : 'fas fa-moon';

            document.getElementById('themeToggle').addEventListener('click', () => {
                const isDark = document.documentElement.classList.toggle('dark');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                themeIcon.className = isDark ? 'fas fa-sun text-yellow-400' : 'fas fa-moon';
            });
        }

        window.onload = init;
    </script>
</body>
</html>
